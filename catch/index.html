<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pokemon Catch! 🎉</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="start-content">
      <h1 class="title">⚡ Pokemon Catch! ⚡</h1>
      <div class="mascot">🎯</div>
      <p class="subtitle">Tap the Pokemon before they run away!</p>
      <button id="start-btn" class="big-btn">▶ Play!</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div id="score-box">⭐ <span id="score">0</span></div>
      <div id="caught-box">🎉 <span id="caught">0</span> caught</div>
      <div id="timer-box">⏱ <span id="timer">30</span>s</div>
    </div>
    <div id="arena">
      <div id="pokeball-cursor">🎾</div>
    </div>
    <div id="level-banner" class="hidden">Level Up! 🚀</div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-content">
      <h2 id="result-title">Time's up!</h2>
      <div id="result-stars"></div>
      <p id="result-msg"></p>
      <div id="pokedex">
        <h3>🏆 Pokemon you caught:</h3>
        <div id="caught-list"></div>
      </div>
      <button id="play-again-btn" class="big-btn">🔄 Play Again!</button>
    </div>
  </div>

  <!-- Back to hub -->
  <a href="../" id="hub-link" title="All Games">🏠</a>

  <script src="game.js"></script>
</body>
</html>
